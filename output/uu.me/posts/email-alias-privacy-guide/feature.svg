<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Email alias privacy workflow</title>
  <desc id="desc">A diagram showing different email aliases forwarding into one protected inbox.</desc>
  <rect width="1200" height="675" fill="#121827"/>
  <circle cx="980" cy="120" r="260" fill="#2DF3D0" opacity=".16"/>
  <circle cx="190" cy="560" r="280" fill="#38BDF8" opacity=".13"/>
  <circle cx="760" cy="560" r="220" fill="#C3F083" opacity=".14"/>
  <rect x="120" y="116" width="960" height="443" rx="28" fill="#1A1F2E" stroke="#FFFFFF" stroke-opacity=".12"/>
  <text x="160" y="184" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800">Email aliases protect your real inbox</text>
  <text x="160" y="232" fill="#B7C0CE" font-family="Inter, Arial, sans-serif" font-size="24">Use a different address for every signup, then forward mail to one private inbox.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="170" y="312" width="230" height="70" rx="16" fill="#243044" stroke="#2DF3D0"/>
    <text x="200" y="356" fill="#FFFFFF">reddit@uu.me</text>
    <rect x="170" y="408" width="230" height="70" rx="16" fill="#243044" stroke="#38BDF8"/>
    <text x="200" y="452" fill="#FFFFFF">shop@uu.me</text>
    <rect x="170" y="504" width="230" height="70" rx="16" fill="#243044" stroke="#C3F083"/>
    <text x="200" y="548" fill="#FFFFFF">work@uu.me</text>
  </g>
  <path d="M430 347 C520 347 540 333 620 333" stroke="#2DF3D0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M430 443 C520 443 540 407 620 407" stroke="#38BDF8" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M430 539 C525 539 540 480 620 480" stroke="#C3F083" stroke-width="8" fill="none" stroke-linecap="round"/>
  <rect x="630" y="300" width="350" height="210" rx="26" fill="#0D1117" stroke="#FFFFFF" stroke-opacity=".14"/>
  <path d="M700 360 H910 V475 H700 Z" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linejoin="round"/>
  <path d="M700 365 L805 430 L910 365" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="705" y="560" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">one real inbox stays private</text>
</svg>
