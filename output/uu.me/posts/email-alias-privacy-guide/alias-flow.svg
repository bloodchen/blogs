<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">How an email alias forwards mail</title>
  <desc id="desc">A four-step flow from website signup to alias, policy check, and real inbox forwarding.</desc>
  <rect width="960" height="540" fill="#121827"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="70" y="76" fill="#FFFFFF" font-size="34" font-weight="800">How an email alias works</text>
    <text x="70" y="112" fill="#AEB8C7" font-size="18">The site sees the alias. Your real mailbox stays behind the forwarding layer.</text>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="70" y="200" width="170" height="116" rx="18" fill="#1A1F2E" stroke="#38BDF8"/>
    <text x="105" y="250" fill="#FFFFFF">Website</text>
    <text x="104" y="280" fill="#AEB8C7" font-size="14">signup form</text>
    <rect x="294" y="200" width="170" height="116" rx="18" fill="#1A1F2E" stroke="#2DF3D0"/>
    <text x="331" y="250" fill="#FFFFFF">Alias</text>
    <text x="315" y="280" fill="#AEB8C7" font-size="14">site-name@uu.me</text>
    <rect x="518" y="200" width="170" height="116" rx="18" fill="#1A1F2E" stroke="#C3F083"/>
    <text x="558" y="250" fill="#FFFFFF">Policy</text>
    <text x="548" y="280" fill="#AEB8C7" font-size="14">allow, hold, block</text>
    <rect x="742" y="200" width="170" height="116" rx="18" fill="#1A1F2E" stroke="#FFFFFF" stroke-opacity=".65"/>
    <text x="773" y="250" fill="#FFFFFF">Inbox</text>
    <text x="765" y="280" fill="#AEB8C7" font-size="14">private address</text>
  </g>
  <g stroke="#FFFFFF" stroke-opacity=".55" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M250 258 H284"/>
    <path d="M474 258 H508"/>
    <path d="M698 258 H732"/>
  </g>
  <g fill="#FFFFFF" fill-opacity=".72">
    <path d="M282 246 L298 258 L282 270 Z"/>
    <path d="M506 246 L522 258 L506 270 Z"/>
    <path d="M730 246 L746 258 L730 270 Z"/>
  </g>
  <text x="70" y="404" fill="#B7C0CE" font-family="Inter, Arial, sans-serif" font-size="18">If the alias leaks, the damage is scoped to that one website or workflow.</text>
</svg>
